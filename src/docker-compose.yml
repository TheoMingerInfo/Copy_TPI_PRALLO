services:
  mysql:
    image: mysql:8.0
    container_name: prallo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-prallo}
      MYSQL_USER: ${DB_USER:-prallo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-prallo}
    ports:
      - "3306:3306"
    volumes:
      - prallo_mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 5s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: prallo_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-prallo}
      PMA_PASSWORD: ${DB_PASSWORD:-prallo}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  prallo_mysql_data:
